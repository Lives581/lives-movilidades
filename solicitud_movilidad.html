<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solicitud de Movilidad — LIVES</title>
<style>
  :root{
    --petroleo:#0E3B36; --esmeralda:#10B981; --alerta:#DC2626;
    --monetario:#F59E0B; --fondo:#F1F6F4; --gris:#6B7280; --borde:#D1D5DB;
  }
  *{box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI',Arial,sans-serif;}
  body{background:var(--fondo); min-height:100vh;}
  header{background:var(--petroleo); color:#fff; padding:16px 20px; display:flex; align-items:center; justify-content:space-between;}
  header h1{font-size:18px; font-weight:600; letter-spacing:.5px;}
  header .marca{font-size:20px; font-weight:300; letter-spacing:6px;}
  .contenedor{max-width:560px; margin:24px auto; padding:0 16px;}
  .tarjeta{background:#fff; border-radius:12px; box-shadow:0 2px 8px rgba(14,59,54,.08); padding:24px;}
  label{display:block; font-size:13px; font-weight:600; color:var(--petroleo); margin:16px 0 6px;}
  label:first-of-type{margin-top:0;}
  select,input[type=text],input[type=number],input[type=date],textarea{
    width:100%; padding:11px 12px; border:1px solid var(--borde); border-radius:8px;
    font-size:15px; background:#fff; color:#111;
  }
  select:focus,input:focus,textarea:focus{outline:2px solid var(--esmeralda); border-color:var(--esmeralda);}
  textarea{resize:vertical; min-height:70px;}
  .fila-chips{display:flex; gap:8px; flex-wrap:wrap;}
  .chip{flex:1; min-width:90px; text-align:center; padding:11px 8px; border:1.5px solid var(--borde);
    border-radius:8px; cursor:pointer; font-size:14px; font-weight:600; color:var(--gris); background:#fff; user-select:none;}
  .chip.activo{border-color:var(--esmeralda); background:#ECFDF5; color:var(--petroleo);}
  .chip.prioridad-si.activo{border-color:var(--alerta); background:#FEF2F2; color:var(--alerta);}
  .info-destino{margin-top:8px; display:none; gap:8px;}
  .info-destino.visible{display:flex;}
  .etiqueta{font-size:12px; font-weight:700; padding:5px 10px; border-radius:20px; background:#ECFDF5; color:var(--petroleo); border:1px solid var(--esmeralda);}
  .etiqueta.zona{background:var(--petroleo); color:#fff; border-color:var(--petroleo);}
  .campo-condicional{display:none;}
  .campo-condicional.visible{display:block;}
  button.enviar{width:100%; margin-top:22px; padding:14px; background:var(--esmeralda); color:#fff;
    border:none; border-radius:10px; font-size:16px; font-weight:700; cursor:pointer;}
  button.enviar:disabled{background:var(--gris); cursor:not-allowed;}
  .mensaje{margin-top:14px; padding:12px; border-radius:8px; font-size:14px; display:none;}
  .mensaje.exito{display:block; background:#ECFDF5; color:#065F46; border:1px solid var(--esmeralda);}
  .mensaje.error{display:block; background:#FEF2F2; color:var(--alerta); border:1px solid var(--alerta);}
  .pantalla-exito{text-align:center; padding:30px 10px; display:none;}
  .pantalla-exito.visible{display:block;}
  .pantalla-exito .icono{width:64px; height:64px; border-radius:50%; background:var(--esmeralda); color:#fff;
    font-size:34px; line-height:64px; margin:0 auto 14px;}
  .pantalla-exito h2{color:var(--petroleo); font-size:20px; margin-bottom:6px;}
  .pantalla-exito .id-mov{font-size:26px; font-weight:800; color:var(--esmeralda); margin:10px 0;}
  .pantalla-exito p{color:var(--gris); font-size:14px;}
  .btn-otra{margin-top:20px; padding:12px 28px; background:var(--petroleo); color:#fff; border:none; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer;}
  footer{text-align:center; color:var(--gris); font-size:11px; padding:18px;}
  .cargando{font-size:13px; color:var(--gris); font-style:italic;}
</style>
</head>
<body>
<header>
  <h1>Solicitud de Movilidad</h1>
  <div class="marca">LIVES</div>
</header>

<div class="contenedor">
  <div class="tarjeta" id="formulario">
    <label>Área solicitante</label>
    <input type="text" id="area" placeholder="Ej.: Avíos, Almacén, Comercial..." autocomplete="off">

    <label>Origen</label>
    <div class="fila-chips" id="chipsOrigen">
      <div class="chip" data-valor="BARRANCO">Barranco</div>
      <div class="chip" data-valor="CHORRILLOS">Chorrillos</div>
    </div>

    <label>Tipo de envío</label>
    <div class="fila-chips" id="chipsTipo">
      <div class="chip" data-valor="CARGA">Carga</div>
      <div class="chip" data-valor="PAQUETE">Paquete</div>
      <div class="chip" data-valor="SOBRE">Sobre</div>
    </div>

    <div class="campo-condicional" id="campoPeso">
      <label>Peso aproximado (kg)</label>
      <input type="number" id="peso" min="0.1" step="0.1" placeholder="Ej.: 25">
    </div>
    <div class="campo-condicional" id="campoCantidad">
      <label>Cantidad (unidades)</label>
      <input type="number" id="cantidad" min="1" step="1" placeholder="Ej.: 3">
    </div>

    <label>Destino</label>
    <select id="destino"><option value="">Cargando destinos...</option></select>
    <div class="info-destino" id="infoDestino">
      <span class="etiqueta" id="etqDistrito"></span>
      <span class="etiqueta zona" id="etqZona"></span>
    </div>

    <label>Prioridad</label>
    <div class="fila-chips" id="chipsPrioridad">
      <div class="chip prioridad-si" data-valor="SI">Sí, urgente</div>
      <div class="chip activo" data-valor="NO">No</div>
    </div>

    <label>Comentarios (opcional)</label>
    <textarea id="comentarios" placeholder="Referencias, persona que recibe, horario..."></textarea>

    <button class="enviar" id="btnEnviar">Guardar solicitud</button>
    <div class="mensaje" id="mensaje"></div>
  </div>

  <div class="tarjeta pantalla-exito" id="pantallaExito">
    <div class="icono">✓</div>
    <h2>Solicitud registrada</h2>
    <div class="id-mov" id="idGenerado"></div>
    <p>Tu solicitud quedó registrada con fecha y hora automáticas.<br>La encargada de movilidades la programará.</p>
    <button class="btn-otra" id="btnOtra">Registrar otra solicitud</button>
  </div>
</div>

<footer>LIVES · Sistema de Movilidades · Uso interno</footer>

<script>
// =============== CONFIGURACIÓN ===============
var SHEET_ID = '1p8zQ1h7yfufwolkuvfeOWUGMNyCh7r4v35nvXOv0rwg';
var URL_APPS_SCRIPT = 'https://script.google.com/macros/s/AKfycbwY21RREcAXwgrruPzEgAkd_CcEj2PRJSb3ERRFCzOPSAzb2RS2h8zJ1CHDoM0i7UTN/exec';
// =============================================

var directorio = [];   // {nombre, distrito, zona}
var sel = { origen:'', tipo:'', prioridad:'NO' };

// --- Cargar directorio (gviz) ---
(function cargarDirectorio(){
  var s = document.createElement('script');
  window.__gvizCB = function(){};
  var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
            '/gviz/tq?sheet=DIRECTORIO&tqx=out:json;responseHandler:procesarDirectorio';
  s.src = url;
  s.onerror = function(){ selDestino().innerHTML = '<option value="">Error al cargar destinos</option>'; };
  document.body.appendChild(s);
})();

function procesarDirectorio(json){
  try{
    var filas = json.table.rows;
    directorio = [];
    for (var i=0;i<filas.length;i++){
      var c = filas[i].c;
      var nombre  = c[2] && c[2].v ? String(c[2].v).trim() : '';
      var zona    = c[3] && c[3].v ? String(c[3].v).trim() : '';
      var distrito= c[4] && c[4].v ? String(c[4].v).trim() : '';
      if (nombre) directorio.push({nombre:nombre, distrito:distrito, zona:zona});
    }
    directorio.sort(function(a,b){ return a.nombre.localeCompare(b.nombre); });
    var sd = selDestino();
    sd.innerHTML = '<option value="">— Selecciona destino —</option>';
    directorio.forEach(function(d,i){
      var op = document.createElement('option');
      op.value = i; op.textContent = d.nombre;
      sd.appendChild(op);
    });
  }catch(e){
    selDestino().innerHTML = '<option value="">Error al procesar destinos</option>';
  }
}
function selDestino(){ return document.getElementById('destino'); }

// gviz usa responseHandler como nombre de función global
window.procesarDirectorio = procesarDirectorio;

// --- Mostrar distrito y zona al elegir destino ---
selDestino().addEventListener('change', function(){
  var info = document.getElementById('infoDestino');
  if (this.value === ''){ info.classList.remove('visible'); return; }
  var d = directorio[parseInt(this.value,10)];
  document.getElementById('etqDistrito').textContent = d.distrito || 'Sin distrito';
  document.getElementById('etqZona').textContent = d.zona || 'Sin zona';
  info.classList.add('visible');
});

// --- Chips ---
function activarChips(idGrupo, clave, alCambiar){
  var grupo = document.getElementById(idGrupo);
  grupo.addEventListener('click', function(ev){
    var chip = ev.target.closest('.chip');
    if (!chip) return;
    grupo.querySelectorAll('.chip').forEach(function(c){ c.classList.remove('activo'); });
    chip.classList.add('activo');
    sel[clave] = chip.getAttribute('data-valor');
    if (alCambiar) alCambiar(sel[clave]);
  });
}
activarChips('chipsOrigen','origen');
activarChips('chipsPrioridad','prioridad');
activarChips('chipsTipo','tipo', function(v){
  document.getElementById('campoPeso').classList.toggle('visible', v==='CARGA');
  document.getElementById('campoCantidad').classList.toggle('visible', v==='PAQUETE'||v==='SOBRE');
});

// --- Recordar área (predeterminado por equipo) ---
var inputArea = document.getElementById('area');
try{
  var g = localStorage.getItem('lives_area_solicitante');
  if (g) inputArea.value = g;
}catch(e){}

// --- Enviar ---
document.getElementById('btnEnviar').addEventListener('click', function(){
  var msg = document.getElementById('mensaje');
  msg.className = 'mensaje';

  var area = inputArea.value.trim();
  var destinoIdx = selDestino().value;
  var errores = [];
  if (!area) errores.push('el área solicitante');
  if (!sel.origen) errores.push('el origen');
  if (!sel.tipo) errores.push('el tipo de envío');
  if (sel.tipo==='CARGA' && !document.getElementById('peso').value) errores.push('el peso aproximado');
  if ((sel.tipo==='PAQUETE'||sel.tipo==='SOBRE') && !document.getElementById('cantidad').value) errores.push('la cantidad');
  if (destinoIdx==='') errores.push('el destino');
  if (errores.length){
    msg.className = 'mensaje error';
    msg.textContent = 'Falta completar: ' + errores.join(', ') + '.';
    return;
  }
  if (URL_APPS_SCRIPT.indexOf('PEGAR_AQUI') === 0){
    msg.className = 'mensaje error';
    msg.textContent = 'Falta configurar la URL del Apps Script en el código.';
    return;
  }

  try{ localStorage.setItem('lives_area_solicitante', area); }catch(e){}

  var d = directorio[parseInt(destinoIdx,10)];
  var btn = document.getElementById('btnEnviar');
  btn.disabled = true; btn.textContent = 'Guardando...';

  var params = {
    accion:'nueva', area:area, origen:sel.origen, tipo:sel.tipo,
    peso: document.getElementById('peso').value || '',
    cantidad: document.getElementById('cantidad').value || '',
    destino:d.nombre, distrito:d.distrito, zona:d.zona,
    prioridad:sel.prioridad,
    comentarios: document.getElementById('comentarios').value.trim(),
    callback:'respuestaGuardar'
  };
  var qs = Object.keys(params).map(function(k){
    return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);
  }).join('&');

  var s = document.createElement('script');
  s.src = URL_APPS_SCRIPT + '?' + qs;
  s.onerror = function(){
    btn.disabled=false; btn.textContent='Guardar solicitud';
    msg.className='mensaje error';
    msg.textContent='No se pudo conectar. Revisa tu internet e intenta de nuevo.';
  };
  document.body.appendChild(s);
});

window.respuestaGuardar = function(r){
  var btn = document.getElementById('btnEnviar');
  btn.disabled=false; btn.textContent='Guardar solicitud';
  var msg = document.getElementById('mensaje');
  if (r && r.ok){
    document.getElementById('formulario').style.display='none';
    document.getElementById('idGenerado').textContent = r.id;
    document.getElementById('pantallaExito').classList.add('visible');
  } else {
    msg.className='mensaje error';
    msg.textContent = (r && r.msg) ? r.msg : 'Error desconocido al guardar.';
  }
};

document.getElementById('btnOtra').addEventListener('click', function(){
  // Limpiar campos variables, mantener área y origen (suelen repetirse)
  document.getElementById('peso').value='';
  document.getElementById('cantidad').value='';
  document.getElementById('comentarios').value='';
  selDestino().value='';
  document.getElementById('infoDestino').classList.remove('visible');
  document.getElementById('chipsTipo').querySelectorAll('.chip').forEach(function(c){c.classList.remove('activo');});
  sel.tipo='';
  document.getElementById('campoPeso').classList.remove('visible');
  document.getElementById('campoCantidad').classList.remove('visible');
  // Prioridad vuelve a NO
  document.getElementById('chipsPrioridad').querySelectorAll('.chip').forEach(function(c){
    c.classList.toggle('activo', c.getAttribute('data-valor')==='NO');
  });
  sel.prioridad='NO';
  document.getElementById('mensaje').className='mensaje';
  document.getElementById('pantallaExito').classList.remove('visible');
  document.getElementById('formulario').style.display='block';
});
</script>
</body>
</html>
