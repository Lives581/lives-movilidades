<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Entregas — LIVES</title>
<style>
  :root{
    --petroleo:#0E3B36; --esmeralda:#10B981; --alerta:#DC2626;
    --monetario:#F59E0B; --fondo:#F1F6F4; --gris:#6B7280; --borde:#D1D5DB;
  }
  *{box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI',Arial,sans-serif;}
  body{background:var(--fondo); min-height:100vh; padding-bottom:24px;}
  header{background:var(--petroleo); color:#fff; padding:16px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:20;}
  header h1{font-size:17px; font-weight:600;}
  header .marca{font-size:20px; font-weight:300; letter-spacing:6px;}
  .contenedor{max-width:560px; margin:18px auto; padding:0 14px;}

  .selector{background:#fff; border-radius:12px; padding:18px; box-shadow:0 2px 8px rgba(14,59,54,.08); margin-bottom:16px;}
  .selector label{display:block; font-size:13px; font-weight:600; color:var(--petroleo); margin-bottom:8px;}
  .selector select{width:100%; padding:12px; border:1px solid var(--borde); border-radius:8px; font-size:16px;}
  .selector .refrescar{margin-top:10px; width:100%; padding:10px; background:var(--esmeralda); color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer;}

  .resumen{font-size:13px; color:var(--gris); margin:0 4px 12px;}
  .resumen b{color:var(--petroleo);}

  .card{background:#fff; border-radius:12px; padding:16px; box-shadow:0 2px 8px rgba(14,59,54,.08); margin-bottom:14px; border-left:5px solid var(--esmeralda);}
  .card.urgente{border-left-color:var(--alerta);}
  .card .top{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px;}
  .card .id{font-weight:800; color:var(--petroleo); font-size:15px;}
  .card .badge-urg{background:var(--alerta); color:#fff; font-size:11px; font-weight:700; padding:3px 9px; border-radius:12px;}
  .card .badge-zona{background:var(--petroleo); color:#fff; font-size:11px; font-weight:700; padding:3px 9px; border-radius:12px;}
  .card .badge-serv{font-size:11px; font-weight:800; padding:3px 9px; border-radius:12px;}
  .card .badge-serv.envio{background:var(--petroleo); color:#fff;}
  .card .badge-serv.recojo{background:var(--monetario); color:#fff;}
  .card .accion-linea{font-size:12px; font-weight:800; letter-spacing:.5px; margin-bottom:2px;}
  .card .accion-linea.envio{color:var(--esmeralda);}
  .card .accion-linea.recojo{color:var(--monetario);}
  .card .destino{font-size:18px; font-weight:700; color:#111; margin-bottom:2px;}
  .card .distrito{font-size:13px; color:var(--gris); margin-bottom:10px;}
  .card .datos{font-size:13px; color:#374151; line-height:1.7; margin-bottom:12px;}
  .card .datos b{color:var(--petroleo);}
  .card .coment{background:#F9FAFB; border-radius:7px; padding:8px 10px; font-size:12px; color:var(--gris); margin-bottom:12px;}

  .acciones{display:flex; gap:10px;}
  .btn-entregado{flex:1; padding:13px; background:var(--esmeralda); color:#fff; border:none; border-radius:9px; font-size:15px; font-weight:700; cursor:pointer;}
  .btn-noentregado{flex:1; padding:13px; background:#fff; color:var(--alerta); border:1.5px solid var(--alerta); border-radius:9px; font-size:15px; font-weight:700; cursor:pointer;}
  .btn-foto{width:100%; margin-top:10px; padding:11px; background:#fff; color:var(--petroleo); border:1.5px dashed var(--borde); border-radius:9px; font-size:14px; font-weight:600; cursor:pointer;}
  .btn-foto.con-foto{border-style:solid; border-color:var(--esmeralda); color:var(--esmeralda); background:#ECFDF5;}
  .foto-input{display:none;}
  .preview{margin-top:10px; text-align:center;}
  .preview img{max-width:100%; max-height:160px; border-radius:8px; border:1px solid var(--borde);}

  .motivo-box{margin-top:10px; display:none;}
  .motivo-box.visible{display:block;}
  .motivo-box textarea{width:100%; padding:10px; border:1px solid var(--alerta); border-radius:8px; font-size:14px; min-height:60px; resize:vertical;}
  .motivo-box .confirmar{margin-top:8px; width:100%; padding:12px; background:var(--alerta); color:#fff; border:none; border-radius:8px; font-size:15px; font-weight:700; cursor:pointer;}

  .card.hecha{opacity:.65; border-left-color:var(--gris);}
  .card .estado-final{font-size:14px; font-weight:700; padding:8px; text-align:center; border-radius:8px;}
  .estado-final.ok{background:#D1FAE5; color:#065F46;}
  .estado-final.no{background:#FEE2E2; color:#991B1B;}

  .vacio{text-align:center; color:var(--gris); font-style:italic; padding:40px 20px; background:#fff; border-radius:12px;}
  .toast{position:fixed; top:70px; left:50%; transform:translateX(-50%); padding:13px 20px; border-radius:10px; font-size:14px; font-weight:600; z-index:100; display:none; box-shadow:0 4px 14px rgba(0,0,0,.15); max-width:90%;}
  .toast.exito{display:block; background:#065F46; color:#fff;}
  .toast.error{display:block; background:var(--alerta); color:#fff;}
  .gps-nota{font-size:11px; color:var(--gris); text-align:center; margin-top:6px;}
  footer{text-align:center; color:var(--gris); font-size:11px; padding:16px;}
</style>
</head>
<body>
<header>
  <h1>Mis Entregas</h1>
  <div class="marca">LIVES</div>
</header>

<div class="contenedor">
  <div class="selector">
    <label>Selecciona tu nombre</label>
    <select id="selChofer"><option value="">Cargando...</option></select>
    <button class="refrescar" id="btnRefrescar">Actualizar mi ruta</button>
  </div>

  <div class="resumen" id="resumen"></div>
  <div id="lista"></div>
</div>

<div class="toast" id="toast"></div>
<footer>LIVES · Sistema de Movilidades · Uso interno</footer>

<script>
// =============== CONFIGURACIÓN ===============
var SHEET_ID = '1p8zQ1h7yfufwolkuvfeOWUGMNyCh7r4v35nvXOv0rwg';
var URL_APPS_SCRIPT = 'https://script.google.com/macros/s/AKfycbwY21RREcAXwgrruPzEgAkd_CcEj2PRJSb3ERRFCzOPSAzb2RS2h8zJ1CHDoM0i7UTN/exec';
// =============================================

var choferActual = '';
var solicitudes = [];
var fotos = {}; // id -> dataURL

function valC(c){ return c ? (c.f!=null?c.f:(c.v!=null?c.v:'')) : ''; }

// ---------- Cargar choferes ----------
function cargarChoferes(){
  var s = document.createElement('script');
  s.src = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
          '/gviz/tq?sheet=CHOFERES&tqx=out:json;responseHandler:procesarChoferes&_=' + Date.now();
  document.body.appendChild(s);
}
function procesarChoferes(json){
  var sel = document.getElementById('selChofer');
  sel.innerHTML = '<option value="">— Selecciona tu nombre —</option>';
  try{
    json.table.rows.forEach(function(r){
      var c = r.c;
      var nombre = String(valC(c[0])||'').trim();
      var activo = String(valC(c[3])||'SI').trim().toUpperCase();
      if(nombre && nombre.toUpperCase()!=='CHOFER' && activo!=='NO'){
        var op=document.createElement('option'); op.value=nombre; op.textContent=nombre; sel.appendChild(op);
      }
    });
  }catch(e){}
  // Recordar último chofer en este dispositivo
  try{
    var g = localStorage.getItem('lives_chofer');
    if(g){ sel.value=g; if(sel.value){ choferActual=g; cargarRuta(); } }
  }catch(e){}
}
window.procesarChoferes = procesarChoferes;

document.getElementById('selChofer').addEventListener('change', function(){
  choferActual = this.value;
  try{ localStorage.setItem('lives_chofer', choferActual); }catch(e){}
  if(choferActual) cargarRuta();
  else { document.getElementById('lista').innerHTML=''; document.getElementById('resumen').innerHTML=''; }
});
document.getElementById('btnRefrescar').addEventListener('click', function(){
  if(choferActual) cargarRuta(); else mostrarToast('Selecciona tu nombre primero','error');
});

// ---------- Cargar ruta del chofer ----------
function cargarRuta(){
  document.getElementById('lista').innerHTML='<div class="vacio">Cargando tu ruta...</div>';
  var s = document.createElement('script');
  s.src = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
          '/gviz/tq?sheet=SOLICITUDES&tqx=out:json;responseHandler:procesarRuta&_=' + Date.now();
  s.onerror = function(){ document.getElementById('lista').innerHTML='<div class="vacio">Error de conexión.</div>'; };
  document.body.appendChild(s);
}
function normalizar(s){ return String(s||'').toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim(); }

function procesarRuta(json){
  solicitudes = [];
  var chN = normalizar(choferActual);
  try{
    json.table.rows.forEach(function(r){
      var c = r.c;
      var idFila = String(valC(c[0])||'').trim();
      if(idFila.toUpperCase()==='ID') return; // descartar fila de encabezado
      var chofer = normalizar(valC(c[12]));
      var estado = String(valC(c[14])||'').toUpperCase();
      if(chofer !== chN) return;
      if(estado !== 'PROGRAMADO') return; // solo lo pendiente de entregar
      solicitudes.push({
        id:String(valC(c[0])||''), tipo:String(valC(c[4])||''),
        cantidad:String(valC(c[5])||''), peso:String(valC(c[6])||''),
        destino:String(valC(c[7])||''), distrito:String(valC(c[8])||''),
        zona:String(valC(c[9])||'').toUpperCase(), prioridad:String(valC(c[10])||'').toUpperCase(),
        comentarios:String(valC(c[11])||''), fechaprog:String(valC(c[13])||''), area:String(valC(c[2])||''),
        origen:String(valC(c[3])||''), servicio:String(valC(c[20])||'ENVIO').toUpperCase(),
        num:(function(){var m=String(valC(c[0])).match(/MOV-(\d+)/);return m?parseInt(m[1],10):0;})()
      });
    });
  }catch(e){}
  solicitudes.sort(function(a,b){
    if(a.zona!==b.zona) return a.zona<b.zona?-1:1;
    var ua=a.prioridad==='SI'?0:1, ub=b.prioridad==='SI'?0:1;
    if(ua!==ub) return ua-ub;
    return a.num-b.num;
  });
  render();
}
window.procesarRuta = procesarRuta;

function render(){
  var lista = document.getElementById('lista');
  document.getElementById('resumen').innerHTML = '<b>'+solicitudes.length+'</b> entrega(s) por realizar';
  if(!solicitudes.length){ lista.innerHTML='<div class="vacio">No tienes entregas programadas por ahora.</div>'; return; }
  var html='';
  solicitudes.forEach(function(o){
    var cantPeso = o.tipo.toUpperCase()==='CARGA' ? (o.peso? o.peso+' kg':'—') : (o.cantidad? o.cantidad+' und':'—');
    var esRecojo = o.servicio==='RECOJO';
    var badgeServ = esRecojo ? '<span class="badge-serv recojo">RECOJO</span>' : '<span class="badge-serv envio">ENVÍO</span>';
    var lineaAccion = esRecojo
        ? '<div class="accion-linea recojo">📥 RECOGER EN:</div><div class="destino">'+o.destino+'</div><div class="distrito">'+o.distrito+' · luego llevar a <b>'+o.origen+'</b></div>'
        : '<div class="accion-linea envio">📤 ENTREGAR EN:</div><div class="destino">'+o.destino+'</div><div class="distrito">'+o.distrito+'</div>';
    var txtBtnOk = esRecojo ? '✓ Recogido' : '✓ Entregado';
    html += '<div class="card '+(o.prioridad==='SI'?'urgente':'')+'" id="card-'+o.id+'">'
      + '<div class="top"><span class="id">'+o.id+'</span>'
      +   '<span>'+badgeServ+' '+(o.prioridad==='SI'?'<span class="badge-urg">URGENTE</span> ':'')+'<span class="badge-zona">'+o.zona+'</span></span></div>'
      + lineaAccion
      + '<div class="datos"><b>Tipo:</b> '+o.tipo+' · <b>'+cantPeso+'</b><br><b>Área:</b> '+o.area+'</div>'
      + (o.comentarios? '<div class="coment">📝 '+o.comentarios+'</div>':'')
      + '<div class="acciones">'
      +   '<button class="btn-entregado" onclick="marcarEntregado(\''+o.id+'\')">'+txtBtnOk+'</button>'
      +   '<button class="btn-noentregado" onclick="mostrarMotivo(\''+o.id+'\')">No se pudo</button>'
      + '</div>'
      + '<label class="btn-foto" id="lblfoto-'+o.id+'" for="foto-'+o.id+'">📷 Tomar foto (opcional)</label>'
      + '<input type="file" accept="image/*" capture="environment" class="foto-input" id="foto-'+o.id+'" onchange="capturarFoto(\''+o.id+'\', this)">'
      + '<div class="preview" id="prev-'+o.id+'"></div>'
      + '<div class="motivo-box" id="motivo-'+o.id+'">'
      +   '<textarea id="txtmotivo-'+o.id+'" placeholder="¿Por qué no se pudo? (obligatorio)"></textarea>'
      +   '<button class="confirmar" onclick="marcarNoEntregado(\''+o.id+'\')">Confirmar</button>'
      + '</div>'
      + '</div>';
  });
  lista.innerHTML = html;
}

// ---------- Foto (comprimir) ----------
function capturarFoto(id, input){
  var file = input.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(ev){
    var img = new Image();
    img.onload = function(){
      var max=900, w=img.width, h=img.height;
      if(w>h && w>max){ h=h*max/w; w=max; } else if(h>max){ w=w*max/h; h=max; }
      var cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      var dataUrl = cv.toDataURL('image/jpeg', 0.55);
      fotos[id] = dataUrl;
      document.getElementById('prev-'+id).innerHTML='<img src="'+dataUrl+'">';
      var lbl=document.getElementById('lblfoto-'+id);
      lbl.classList.add('con-foto'); lbl.textContent='✓ Foto adjunta (toca para cambiar)';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ---------- Geolocalización (no bloqueante) ----------
function obtenerUbicacion(){
  return new Promise(function(resolve){
    if(!navigator.geolocation){ resolve({lat:'',lng:''}); return; }
    var listo=false;
    var t=setTimeout(function(){ if(!listo){ listo=true; resolve({lat:'',lng:''}); } }, 7000);
    navigator.geolocation.getCurrentPosition(
      function(pos){ if(!listo){ listo=true; clearTimeout(t); resolve({lat:pos.coords.latitude.toFixed(6), lng:pos.coords.longitude.toFixed(6)}); } },
      function(){ if(!listo){ listo=true; clearTimeout(t); resolve({lat:'',lng:''}); } },
      { enableHighAccuracy:true, timeout:6000, maximumAge:0 }
    );
  });
}

// ---------- Marcar entregado ----------
function marcarEntregado(id){
  var card = document.getElementById('card-'+id);
  var btns = card.querySelectorAll('button');
  btns.forEach(function(b){ b.disabled=true; });
  card.querySelector('.btn-entregado').textContent='Registrando...';
  obtenerUbicacion().then(function(u){
    enviarEstado(id, 'ENTREGADO', '', u);
  });
}
function mostrarMotivo(id){
  document.getElementById('motivo-'+id).classList.add('visible');
}
function marcarNoEntregado(id){
  var motivo = document.getElementById('txtmotivo-'+id).value.trim();
  if(!motivo){ mostrarToast('Escribe el motivo','error'); return; }
  var card = document.getElementById('card-'+id);
  card.querySelectorAll('button').forEach(function(b){ b.disabled=true; });
  obtenerUbicacion().then(function(u){
    enviarEstado(id, 'NO ENTREGADO', motivo, u);
  });
}

function enviarEstado(id, estado, motivo, u){
  var params = {
    accion:'entregar', id:id, estado:estado, motivo:motivo||'',
    lat:u.lat||'', lng:u.lng||'', chofer:choferActual, callback:'respEstado'
  };
  var qs = Object.keys(params).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);}).join('&');
  var s = document.createElement('script');
  s.src = URL_APPS_SCRIPT + '?' + qs;
  window.__idEnCurso = id;
  s.onerror = function(){ mostrarToast('Error de conexión','error'); reactivar(id); };
  document.body.appendChild(s);
}

window.respEstado = function(r){
  var id = window.__idEnCurso;
  if(r && r.ok){
    // Enviar foto si existe (best-effort, por separado)
    if(fotos[id]) enviarFoto(id, fotos[id]);
    mostrarToast('Registrado: '+(r.msg||'ok'),'exito');
    // Quitar la card de la lista
    solicitudes = solicitudes.filter(function(x){ return x.id!==id; });
    render();
  } else {
    mostrarToast((r&&r.msg)?r.msg:'Error al registrar','error');
    reactivar(id);
  }
};

function reactivar(id){
  var card = document.getElementById('card-'+id);
  if(!card) return;
  card.querySelectorAll('button').forEach(function(b){ b.disabled=false; });
  var be=card.querySelector('.btn-entregado'); if(be) be.textContent='✓ Entregado';
}

// Foto vía POST no-cors (fire-and-forget: registra en Drive sin bloquear el flujo)
function enviarFoto(id, dataUrl){
  try{
    fetch(URL_APPS_SCRIPT, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({accion:'foto', id:id, foto:dataUrl})
    });
  }catch(e){}
}

function mostrarToast(msg, tipo){
  var t=document.getElementById('toast'); t.textContent=msg; t.className='toast '+tipo;
  setTimeout(function(){ t.className='toast'; }, 4000);
}

// Init
cargarChoferes();
</script>
</body>
</html>
